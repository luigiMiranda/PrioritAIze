<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CVRS — Contextual Vulnerability Risk Scoring{% endblock %}</title>
    <!-- Apply saved theme immediately to prevent flash of wrong theme -->
    <script>
    (function(){var t=localStorage.getItem('cvrs-theme');if(t){document.documentElement.setAttribute('data-bs-theme',t);}})();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">&#x1f510; PrioritAIze</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="/">Dashboard</a>
                    <a class="nav-link" href="/evaluate">New Evaluation</a>
                    <a class="nav-link" href="/evaluate/custom">Custom</a>
                    <a class="nav-link" href="/batch">Batch</a>
                    <a class="nav-link" href="/metrics">Metrics</a>
                </div>
                <div class="form-check form-switch text-light">
                    <input class="form-check-input" type="checkbox" id="theme-toggle">
                    <label class="form-check-label" for="theme-toggle">Dark</label>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <small>CVRS v0.2.0 &mdash; Contextual Vulnerability Risk Scoring via LLM</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Shared theme toggle — keep in sync with localStorage across all pages
    (function(){
        var toggle=document.getElementById('theme-toggle');
        if(toggle){
            toggle.checked=localStorage.getItem('cvrs-theme')==='dark';
            toggle.addEventListener('change',function(e){
                var theme=e.target.checked?'dark':'light';
                localStorage.setItem('cvrs-theme',theme);
                document.documentElement.setAttribute('data-bs-theme',theme);
            });
        }
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
